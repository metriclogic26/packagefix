<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Transparent background -->
  
  <!-- Outer rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="#0B0D14"/>
  
  <!-- Subtle border -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="none" stroke="#6C63FF" stroke-width="6" opacity="0.4"/>

  <!-- Package box shape (bottom) -->
  <rect x="140" y="260" width="232" height="180" rx="12" fill="#13151F" stroke="#2A2D3E" stroke-width="3"/>
  
  <!-- Package box lid -->
  <rect x="128" y="230" width="256" height="48" rx="10" fill="#1A1D2E" stroke="#2A2D3E" stroke-width="3"/>
  
  <!-- Package ribbon vertical -->
  <rect x="240" y="230" width="32" height="210" rx="4" fill="#6C63FF" opacity="0.9"/>
  
  <!-- Package ribbon horizontal on lid -->
  <rect x="128" y="246" width="256" height="16" rx="4" fill="#6C63FF" opacity="0.9"/>

  <!-- Shield overlay (security) -->
  <path d="M256 108 L316 134 L316 186 Q316 222 256 244 Q196 222 196 186 L196 134 Z" 
        fill="#6C63FF" opacity="0.15" stroke="#6C63FF" stroke-width="4" stroke-linejoin="round"/>
  
  <!-- Checkmark inside shield -->
  <path d="M228 178 L248 198 L286 158" 
        stroke="#22C55E" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Small sparkle top right -->
  <circle cx="368" cy="108" r="6" fill="#6C63FF" opacity="0.8"/>
  <circle cx="388" cy="128" r="4" fill="#6C63FF" opacity="0.5"/>
  <circle cx="352" cy="132" r="3" fill="#22C55E" opacity="0.7"/>
</svg>
